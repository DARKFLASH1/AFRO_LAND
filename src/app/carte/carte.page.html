<!-- ── AFRO_LAND — Carte Page ─────────────────────────────────────────────── -->
<!-- Partie 4 : Popup aperçu, géolocalisation, légende, recherche sur carte    -->
<!-- ─────────────────────────────────────────────────────────────────────────── -->

<ion-header class="header-toolbar">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" text="Retour"></ion-back-button>
    </ion-buttons>

    <ion-title class="header-title">Carte de l'Afrique</ion-title>

    <ion-buttons slot="end">
      <!-- Recherche sur carte -->
      <ion-button (click)="toggleRechercheCartes()" [class.active]="afficherRechercheCartes" aria-label="Rechercher un pays">
        <ion-icon [name]="afficherRechercheCartes ? 'close-outline' : 'search-outline'" slot="icon-only"></ion-icon>
      </ion-button>
      <!-- Géolocalisation -->
      <ion-button (click)="locateMe()" aria-label="Me localiser">
        <ion-icon name="locate-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>

  <!-- Barre de recherche sur carte (conditionnelle) -->
  <ion-toolbar *ngIf="afficherRechercheCartes" class="toolbar-search-carte">
    <ion-searchbar
      placeholder="Zoomer sur un pays..."
      [(ngModel)]="termeRechercheCartes"
      (ionInput)="onRechercheCartes($event)"
      show-cancel-button="always"
      (ionCancel)="toggleRechercheCartes()"
      [debounce]="300"
      autofocus="true">
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<!-- ── Overlay suggestions de recherche ──────────────────────────────────── -->
<div *ngIf="afficherRechercheCartes && termeRechercheCartes.length > 1" class="carte-recherche-overlay">
  <ion-spinner *ngIf="rechercheCartesEnCours" name="crescent" class="carte-spinner"></ion-spinner>

  <ion-list *ngIf="!rechercheCartesEnCours && suggestionsCartes.length > 0" lines="full">
    <ion-item
      *ngFor="let s of suggestionsCartes"
      (click)="zoomVersPays(s.id, s.name)"
      button>
      <ion-avatar slot="start" class="flag-avatar-sm">
        <img [src]="s.flag" [alt]="s.name" loading="lazy" />
      </ion-avatar>
      <ion-label>
        <span class="suggestion-name">{{ s.name }}</span>
      </ion-label>
      <ion-icon name="locate-outline" slot="end" color="medium"></ion-icon>
    </ion-item>
  </ion-list>

  <div *ngIf="!rechercheCartesEnCours && suggestionsCartes.length === 0" class="carte-aucun-resultat">
    <ion-icon name="search-outline"></ion-icon>
    <p>Aucun pays trouvé pour « {{ termeRechercheCartes }} »</p>
  </div>
</div>

<!-- ── Carte Leaflet ─────────────────────────────────────────────────────── -->
<ion-content>
  <div id="mapId" style="height: 100%; width: 100%;"></div>
</ion-content>
